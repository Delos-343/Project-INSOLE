# ============================================================================
# Insole Foot Classification — docker-compose
# ----------------------------------------------------------------------------
# Services
#   db        : PostgreSQL 16
#   backend   : FastAPI + ML model on port 8000
#   trainer   : One-shot training job (run with `docker compose run trainer`)
#   pgadmin   : Optional web DB UI on port 5050 (--profile tools)
#
# Quick start
#   1) cp .env.example .env  (adjust values if needed)
#   2) docker compose up -d db backend
#   3) Open http://localhost:8000/docs
#   4) To train:  docker compose run --rm trainer --epochs 30
# ============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: insole_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-insole_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_securely}
      POSTGRES_DB: ${POSTGRES_DB:-insole_db}
      TZ: UTC
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - insole_pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insole_admin} -d ${POSTGRES_DB:-insole_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: insole/backend:latest
    container_name: insole_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

    # ─── CRITICAL FOR PYTORCH DATALOADER ──────────────────────────────
    # Default container /dev/shm is only 64 MB. PyTorch DataLoader workers
    # use shared memory to pass tensors between processes; ML workloads
    # blow past 64 MB easily. 4 GB is plenty for batch_size=16 at 256×256.
    shm_size: "4gb"
    # ─────────────────────────────────────────────────────────────────

    # Cap CPU/memory so a runaway training job can't starve the host.
    # Adjust to taste — your host has 16 CPUs / 15 GB RAM.
    deploy:
      resources:
        limits:
          cpus: "12"
          memory: "10g"

    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-insole_admin}:${POSTGRES_PASSWORD:-change_me_securely}@db:5432/${POSTGRES_DB:-insole_db}
      AUTO_CREATE_TABLES: "1"
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATA_DIR: /workspace/data
      UPLOAD_DIR: /workspace/data/uploads
      DEFAULT_CHECKPOINT_PATH: /workspace/backend/model/checkpoints/best.pt
      # Force DataLoader workers to 0 inside containers — Albumentations
      # + spawn-based workers + WSL2 bind mounts is a fragile combo and
      # gains us nothing on CPU. Single-process loading is plenty fast
      # for a ~1,000-sample dataset.
      INSOLE_FORCE_WORKERS: "0"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/workspace/data
      - ./backend/model/checkpoints:/workspace/backend/model/checkpoints

  trainer:
    build:
      context: .
      dockerfile: docker/Dockerfile.trainer
    image: insole/trainer:latest
    container_name: insole_trainer
    profiles: ["training"]            # excluded from default `up`
    depends_on:
      db:
        condition: service_healthy
    shm_size: "4gb"
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-insole_admin}:${POSTGRES_PASSWORD:-change_me_securely}@db:5432/${POSTGRES_DB:-insole_db}
      DATA_DIR: /workspace/data
      PYTHONPATH: /workspace
      INSOLE_FORCE_WORKERS: "0"
    volumes:
      - ./data:/workspace/data
      - ./backend/model/checkpoints:/workspace/backend/model/checkpoints

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: insole_pgadmin
    profiles: ["tools"]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  insole_pgdata: